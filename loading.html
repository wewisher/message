<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading</title>

<style>
body{
  margin:0;
  height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Poppins,sans-serif;
}

.phone{
  width:390px;
  height:780px;
  background:linear-gradient(135deg,#6a00ff,#ff4ecd);
  border-radius:28px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
}

.loader{
  text-align:center;
}

.dot{
  width:14px;
  height:14px;
  background:#fff;
  border-radius:50%;
  display:inline-block;
  margin:0 4px;
  animation:bounce 1s infinite;
}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}

@keyframes bounce{
  0%,80%,100%{transform:scale(0)}
  40%{transform:scale(1)}
}
p{margin-top:20px;font-size:16px}
</style>
</head>

<body>
<div class="phone">
  <div class="loader">
    <div>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <p id="txt">Reading your vibe…</p>
  </div>
</div>

<script>
const texts=[
 "Reading your vibe 😌",
 "Checking attraction level 😏",
 "Too charming… processing 😈",
 "Analyzing heart impact 👀",
 "Almost done 💘"
];
let i=0;
setInterval(()=>txt.textContent=texts[i++%texts.length],900);
setTimeout(()=>location.href="result.html",4200);
</script>
</body>
</html>
